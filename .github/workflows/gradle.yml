# Android CI —— 在每次 push / PR 时编译 APK，确保代码可编译。
name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # android-actions/setup-android 会根据 build.gradle 中的 compileSdk 自动安装
      # 所需的 SDK 平台和构建工具，并设置 ANDROID_HOME / ANDROID_SDK_ROOT
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3

      # 对于 PR，Gradle 缓存设为只读，避免缓存投毒。
      - name: 配置 Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      # assembleDebug 专注编译，不执行 lint / 测试（加快 CI 反馈速度）。
      - name: 编译 Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # 将生成的 APK 上传为构建产物，方便检查。
      - name: 上传 APK 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
